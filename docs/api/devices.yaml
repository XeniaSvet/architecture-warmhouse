openapi: 3.0.3

info:
  title: Device Management Service API
  description: API управления устройствами Warmhouse System
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: Devices
  - name: Device Types

security:
  - BearerAuth: []

paths:
  /devices:
    get:
      summary: Получение списка устройств
      description: Возвращает список всех зарегистрированных устройств текущего пользователя.
      parameters:
        - name: status
          in: query
          description: Фильтрация устройств по их статусу
          required: false
          schema:
            type: string
            enum: [online, offline, pending]
      responses:
        '200':
          description: Список устройств успешно получен
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceResponse'
        '401':
          description: Не авторизован

    post:
      summary: Создание (регистрация) нового устройства
      description: Добавляет новое устройство в систему (например, по серийному номеру).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreate'
      responses:
        '201':
          description: Устройство успешно зарегистрировано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '400':
          description: Некорректные данные или устройство уже зарегистрировано

  /devices/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Уникальный идентификатор устройства (UUID или MAC-адрес)
        schema:
          type: string
          format: uuid
          example: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"

    get:
      summary: Получение устройства по ID
      responses:
        '200':
          description: Устройство найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '401':
          description: Не авторизован
        '404':
          description: Устройство не найдено

    put:
      summary: Изменение параметров устройства
      description: Обновление названия, настроек или местоположения устройства.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdate'
      responses:
        '200':
          description: Параметры успешно обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '401':
          description: Не авторизован
        '404':
          description: Устройство не найдено

    delete:
      summary: Удаление устройства
      description: Полное удаление устройства из учетной записи пользователя.
      responses:
        '204':
          description: Устройство успешно удалено
        '401':
          description: Не авторизован
        '404':
          description: Устройство не найдено

  /devices/{id}/connect:
    post:
      summary: Подключение устройства к сети / активация
      description: Инициирует процедуру сопряжения, проверки связи или отправки конфигурации для подключения устройства к серверу.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - connectionKey
              properties:
                connectionKey:
                  type: string
                  description: Секретный ключ или пин-код для сопряжения
                  example: "WIFI-XYZ-789"
      responses:
        '200':
          description: Устройство успешно подключено и переведено в статус 'online'
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean
                    example: true
                  status:
                    type: string
                    example: "online"
                  lastSeen:
                    type: string
                    format: date-time
                    example: "2026-06-27T22:00:00Z"
        '400':
          description: Неверный ключ подключения или ошибка связи
        '401':
          description: Не авторизован
        '404':
          description: Устройство не найдено

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DeviceCreate:
      type: object
      required:
        - name
        - serialNumber
        - type
      properties:
        name:
          type: string
          example: "Датчик температуры на кухне"
        serialNumber:
          type: string
          example: "SN-987654321-XYZ"
        type:
          type: string
          enum: [sensor, camera, controller, hub]
          example: "sensor"

    DeviceUpdate:
      type: object
      properties:
        name:
          type: string
          example: "Датчик температуры (Обновленный)"
        location:
          type: string
          example: "Гостиная"

    DeviceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"
        name:
          type: string
          example: "Датчик температуры на кухне"
        serialNumber:
          type: string
          example: "SN-987654321-XYZ"
        type:
          type: string
          example: "sensor"
        status:
          type: string
          enum: [online, offline, pending]
          example: "pending"
        location:
          type: string
          example: "Кухня"
        registeredAt:
          type: string
          format: date-time
          example: "2026-06-27T21:45:00Z"
