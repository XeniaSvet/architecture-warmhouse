openapi: 3.0.3

info:
  title: Monitoring Management Service API
  description: API получения данных датчиков Warmhouse System
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: Monitoring

paths:
  /monitoring/latest:
    get:
      summary: Получение последних данных по всем устройствам
      description: Возвращает самую свежую актуальную телеметрию по каждому активному устройству пользователя.
      responses:
        '200':
          description: Актуальные данные успешно получены
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MonitoringLatestResponse'
        '401':
          description: Не авторизован

  /monitoring/devices/{deviceId}/latest:
    get:
      summary: Получение последних данных конкретного устройства
      description: Возвращает самую свежую метрику для указанного устройства на текущий момент.
      parameters:
        - name: deviceId
          in: path
          required: true
          description: Уникальный идентификатор устройства
          schema:
            type: string
            format: uuid
            example: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"
      responses:
        '200':
          description: Данные устройства успешно получены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MonitoringDataPoint'
        '401':
          description: Не авторизован
        '404':
          description: Устройство не найдено или для него еще нет данных

  /monitoring/devices/{deviceId}/history:
    get:
      summary: Получение данных конкретного устройства за период
      description: Возвращает массив исторических точек телеметрии устройства, отфильтрованный по временному интервалу.
      parameters:
        - name: deviceId
          in: path
          required: true
          description: Уникальный идентификатор устройства
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: true
          description: Начало временного периода (ISO 8601)
          schema:
            type: string
            format: date-time
            example: "2026-06-27T00:00:00Z"
        - name: to
          in: query
          required: true
          description: Конец временного периода (ISO 8601)
          schema:
            type: string
            format: date-time
            example: "2026-06-27T23:59:59Z"
        - name: limit
          in: query
          required: false
          description: Ограничение количества возвращаемых точек (для пагинации)
          schema:
            type: integer
            default: 100
            example: 50
      responses:
        '200':
          description: Исторические данные успешно получены
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MonitoringDataPoint'
        '401':
          description: Не авторизован
        '404':
          description: Устройство не найдено

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    MonitoringRecordRequest:
      type: object
      required:
        - deviceId
        - timestamp
        - metrics
      properties:
        deviceId:
          type: string
          format: uuid
          example: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"
        timestamp:
          type: string
          format: date-time
          description: Точное время снятия показаний на устройстве
          example: "2026-06-27T21:58:10Z"
        metrics:
          type: object
          description: Набор ключ-значение для любых метрик устройства
          additionalProperties:
            type: number
          example:
            temperature: 23.5
            humidity: 45.2
            battery_level: 89.0

    MonitoringDataPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-06-27T21:58:10Z"
        metrics:
          type: object
          additionalProperties:
            type: number
          example:
            temperature: 23.5
            humidity: 45.2

    MonitoringLatestResponse:
      type: object
      properties:
        deviceId:
          type: string
          format: uuid
          example: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"
        deviceName:
          type: string
          example: "Датчик температуры на кухне"
        latestData:
          $ref: '#/components/schemas/MonitoringDataPoint'
